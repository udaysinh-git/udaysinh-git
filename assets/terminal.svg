<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" width="580" height="420">
  <defs>
    <linearGradient id="tb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A246A"/>
      <stop offset="5%" stop-color="#3A6EA5"/>
      <stop offset="50%" stop-color="#0F5FCF"/>
      <stop offset="95%" stop-color="#3A6EA5"/>
      <stop offset="100%" stop-color="#0A246A"/>
    </linearGradient>
    <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E46C56"/>
      <stop offset="50%" stop-color="#C2422A"/>
      <stop offset="100%" stop-color="#B33B24"/>
    </linearGradient>
    <linearGradient id="mb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3F7FBF"/>
      <stop offset="50%" stop-color="#2060A0"/>
      <stop offset="100%" stop-color="#1A5090"/>
    </linearGradient>
    <!-- Typing clipPaths -->
    <clipPath id="c1" clipPathUnits="userSpaceOnUse">
      <rect x="190" y="68" width="0" height="24">
        <animate attributeName="width" from="0" to="100" begin="1s" dur="0.7s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c2" clipPathUnits="userSpaceOnUse">
      <rect x="190" y="168" width="0" height="24">
        <animate attributeName="width" from="0" to="200" begin="4.5s" dur="1s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c3" clipPathUnits="userSpaceOnUse">
      <rect x="190" y="288" width="0" height="24">
        <animate attributeName="width" from="0" to="200" begin="8.5s" dur="1s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    .t { font-family: Consolas, 'Courier New', 'Liberation Mono', monospace; font-size: 16px; fill: #C0C0C0; }
    .prompt { fill: #C0C0C0; }
    .title { font-family: Tahoma, sans-serif; font-size: 13px; fill: white; font-weight: bold; }
    .cmd { fill: #FFFF00; }
    .info { fill: #55FF55; }
    .link { fill: #55FFFF; }
  </style>

  <!-- Window border -->
  <rect x="0" y="0" width="580" height="420" rx="8" ry="8" fill="#0F5FCF"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="580" height="28" rx="8" ry="0" fill="url(#tb)"/>
  <rect x="0" y="15" width="580" height="13" fill="url(#tb)"/>

  <!-- Title bar icon -->
  <rect x="8" y="7" width="14" height="14" fill="#0C0C0C" rx="1"/>
  <text x="10" y="18" class="t" font-size="8" fill="#C0C0C0">C:&gt;</text>

  <!-- Title text -->
  <text x="28" y="19" class="title">C:\WINDOWS\system32\cmd.exe</text>

  <!-- Window buttons -->
  <rect x="512" y="5" width="18" height="18" rx="3" fill="url(#mb)"/>
  <line x1="516" y1="16" x2="526" y2="16" stroke="white" stroke-width="2"/>
  <rect x="534" y="5" width="18" height="18" rx="3" fill="url(#mb)"/>
  <rect x="538" y="9" width="10" height="10" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="556" y="5" width="18" height="18" rx="3" fill="url(#cb)"/>
  <line x1="560" y1="9" x2="570" y2="19" stroke="white" stroke-width="2"/>
  <line x1="570" y1="9" x2="560" y2="19" stroke="white" stroke-width="2"/>

  <!-- Terminal background -->
  <rect x="4" y="28" width="572" height="388" fill="#0C0C0C"/>

  <!-- ══════ TERMINAL SESSION ══════ -->

  <!-- Headers (instant) -->
  <text x="12" y="48" class="t" font-size="14" fill="#808080">Microsoft Windows XP [Version 5.1.2600]</text>
  <text x="12" y="63" class="t" font-size="14" fill="#808080">(C) Copyright 1985-2001 Microsoft Corp.</text>

  <!-- ── CMD 1: whoami ── -->
  <text x="12" y="82" class="t" opacity="0">C:\Users\Udaysinh&gt; <animate attributeName="opacity" to="1" begin="1s" dur="0.01s" fill="freeze"/></text>
  <text x="190" y="82" class="t cmd" clip-path="url(#c1)">whoami</text>

  <!-- whoami output -->
  <text x="20" y="108" class="t" font-weight="bold" opacity="0">  Udaysinh<animate attributeName="opacity" to="1" begin="2.1s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="126" class="t info" opacity="0">  Developer &amp; Cat Enthusiast<animate attributeName="opacity" to="1" begin="2.3s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="144" class="t info" opacity="0">  WeLabs.in | DYPIU, Pune<animate attributeName="opacity" to="1" begin="2.5s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="162" class="t link" opacity="0">  udaysinh.me<animate attributeName="opacity" to="1" begin="2.7s" dur="0.15s" fill="freeze"/></text>

  <!-- ── CMD 2: dir /b Projects\ ── -->
  <text x="12" y="182" class="t" opacity="0">C:\Users\Udaysinh&gt; <animate attributeName="opacity" to="1" begin="4.5s" dur="0.01s" fill="freeze"/></text>
  <text x="190" y="182" class="t cmd" clip-path="url(#c2)">dir /b Projects\</text>

  <!-- dir output -->
  <text x="20" y="208" class="t" opacity="0">  minimal-portfolio<animate attributeName="opacity" to="1" begin="5.9s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="226" class="t" opacity="0">  Scam-Protection<animate attributeName="opacity" to="1" begin="6.1s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="244" class="t" opacity="0">  Panic-Button-V2<animate attributeName="opacity" to="1" begin="6.3s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="262" class="t" opacity="0">  Dither-Girl<animate attributeName="opacity" to="1" begin="6.5s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="280" class="t" opacity="0">  NotAnotherAutoClicker<animate attributeName="opacity" to="1" begin="6.7s" dur="0.15s" fill="freeze"/></text>

  <!-- ── CMD 3: type socials.txt ── -->
  <text x="12" y="300" class="t" opacity="0">C:\Users\Udaysinh&gt; <animate attributeName="opacity" to="1" begin="8.5s" dur="0.01s" fill="freeze"/></text>
  <text x="190" y="300" class="t cmd" clip-path="url(#c3)">type socials.txt</text>

  <!-- socials output -->
  <text x="20" y="326" class="t link" opacity="0">  web:     udaysinh.me<animate attributeName="opacity" to="1" begin="9.9s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="344" class="t link" opacity="0">  x:       @udaysinh_me<animate attributeName="opacity" to="1" begin="10.1s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="362" class="t link" opacity="0">  insta:   udaysinh.me<animate attributeName="opacity" to="1" begin="10.3s" dur="0.15s" fill="freeze"/></text>
  <text x="20" y="380" class="t link" opacity="0">  spotify: sptfy.com/Udaysinh<animate attributeName="opacity" to="1" begin="10.5s" dur="0.15s" fill="freeze"/></text>

  <!-- ── Final prompt + blinking cursor ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="11.5s" dur="0.01s" fill="freeze"/>
    <text x="12" y="400" class="t">C:\Users\Udaysinh&gt; </text>
    <rect x="190" y="388" width="9" height="16" fill="#C0C0C0">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
